<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> CS STORE </title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-container" id="bgContainer"></div>
    <div class="bg-overlay"></div>
    
    <div class="profile">
        <img src="logo cs.JPG" alt=" CS STORE ">
        <h1> CS STORE </h1>
        <p>Jual Beli & Tukar Tambah Smartphone Berkualitas. Unit Original, Bergaransi, & Harga Bersaing!</p>
    </div>

    <div class="links">
        <!-- TOKOPEDIA - POSISI PERTAMA (Paling Penting) -->
        <a href="https://tk.tokopedia.com/ZSH84GpCM/" class="link-item" target="_blank" rel="noopener">
            <img src="tokopedia.png" width="48" height="48" viewBox="0 0 48 48" class="tokopedia-icon">
            </img>
            <span>Tokopedia</span>
        </a>

        <!-- Instagram -->
        <a href="https://www.instagram.com/cs_store74?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" class="link-item" rel="noopener">
            <i class="fab fa-instagram"></i>
            <span>Instagram</span>
        </a>

        <!-- TikTok -->
        <a href="https://www.tiktok.com/@cs_store74" class="link-item" rel="noopener">
            <i class="fab fa-tiktok"></i>
            <span>TikTok</span>
        </a>

        <!-- WhatsApp Dodo -->
        <a href="https://wa.me/+6282152732809/" class="link-item" rel="noopener">
            <i class="fab fa-whatsapp"></i>
            <span>WhatsApp (Dodo)</span>
        </a>

        <!-- WhatsApp Arief -->
        <a href="https://wa.me/+6287881949100/" class="link-item" rel="noopener">
            <i class="fab fa-whatsapp"></i>
            <span>WhatsApp (Arief)</span>
        </a>
    </div>

    <script>
        const backgrounds = [
            'backgrounds/bg1.jpg',
            'backgrounds/bg2.jpg',
            'backgrounds/bg3.jpg',
            'backgrounds/bg4.jpg',
        ];

        let currentBgIndex = 0;
        const bgContainer = document.getElementById('bgContainer');

        setInterval(() => {
            currentBgIndex = (currentBgIndex + 1) % backgrounds.length;
            bgContainer.style.backgroundImage = `url(${backgrounds[currentBgIndex]})`;
        }, 6000);

        bgContainer.style.backgroundImage = `url(${backgrounds[0]})`;

        // Auto open links
        document.querySelectorAll('.link-item').forEach(link => {
            link.addEventListener('click', function(e) {
                window.open(this.href, '_blank', 'noopener,noreferrer');
            });
        });

        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const parallax = document.querySelector('.bg-container');
            parallax.style.transform = `translateY(${scrolled * 0.5}px) scale(1.05)`;
        });
    </script>
</body>
</html>
